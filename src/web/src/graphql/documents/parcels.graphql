query GetRegisteredParcels {
  getRegisteredParcels {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    parcelType
    createdAt
    recipientAddress {
      contactName
      city
      state
      postalCode
      countryCode
    }
    zone {
      id
      name
    }
  }
}

query GetParcelsForRouteCreation {
  parcelsForRouteCreation {
    id
    trackingNumber
    weight
    weightUnit
  }
}

mutation RegisterParcel($input: RegisterParcelInput!) {
  registerParcel(input: $input) {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    length
    width
    height
    dimensionUnit
    declaredValue
    currency
    description
    parcelType
    estimatedDeliveryDate
    createdAt
    zoneId
    zoneName
    depotId
    depotName
  }
}
