query GetRegisteredParcels {
  registeredParcels {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    parcelType
    createdAt
    zoneName
  }
}

query GetPreLoadParcels($search: String, $where: ParcelFilterInput, $order: [ParcelSortInput!]) {
  preLoadParcels(search: $search, where: $where, order: $order) {
    id
    trackingNumber
    status
    serviceType
    weight
    weightUnit
    parcelType
    createdAt
    zoneName
    estimatedDeliveryDate
    recipientContactName
    recipientCompanyName
    recipientStreet1
    recipientCity
    recipientPostalCode
  }
}

query GetPreLoadParcelsConnection(
  $search: String
  $where: ParcelFilterInput
  $order: [ParcelSortInput!]
  $first: Int!
  $after: String
) {
  preLoadParcelsConnection(
    search: $search
    where: $where
    order: $order
    first: $first
    after: $after
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    nodes {
      id
      trackingNumber
      status
      serviceType
      weight
      weightUnit
      parcelType
      createdAt
      zoneName
      estimatedDeliveryDate
      recipientContactName
      recipientCompanyName
      recipientStreet1
      recipientCity
      recipientPostalCode
    }
  }
}

query GetParcelImports {
  parcelImports {
    id
    fileName
    fileFormat
    status
    totalRows
    processedRows
    importedRows
    rejectedRows
    depotName
    createdAt
    startedAt
    completedAt
  }
}

query GetParcelImport($id: UUID!) {
  parcelImport(id: $id) {
    id
    fileName
    fileFormat
    status
    totalRows
    processedRows
    importedRows
    rejectedRows
    depotName
    failureMessage
    createdAt
    startedAt
    completedAt
    createdTrackingNumbers
    rowFailuresPreview {
      rowNumber
      errorMessage
      originalRowValues
    }
  }
}

query GetParcelsForRouteCreation($vehicleId: UUID!, $driverId: UUID!) {
  parcelsForRouteCreation(vehicleId: $vehicleId, driverId: $driverId) {
    id
    trackingNumber
    weight
    weightUnit
    zoneId
    zoneName
  }
}

query GetParcel($id: UUID!) {
  parcel(id: $id) {
    id
    trackingNumber
    status
    shipperAddressId
    serviceType
    weight
    weightUnit
    length
    width
    height
    dimensionUnit
    declaredValue
    currency
    description
    parcelType
    cancellationReason
    estimatedDeliveryDate
    deliveryAttempts
    zoneId
    zoneName
    depotId
    depotName
    createdAt
    lastModifiedAt
    canEdit
    canCancel
    senderAddress {
      street1
      street2
      city
      state
      postalCode
      countryCode
      isResidential
      contactName
      companyName
      phone
      email
    }
    recipientAddress {
      street1
      street2
      city
      state
      postalCode
      countryCode
      isResidential
      contactName
      companyName
      phone
      email
    }
    changeHistory {
      action
      fieldName
      beforeValue
      afterValue
      changedAt
      changedBy
    }
    statusTimeline {
      id
      timestamp
      eventType
      description
      location
      operator
    }
    routeAssignment {
      routeId
      routeStatus
      startDate
      endDate
      driverId
      driverName
      vehicleId
      vehiclePlate
    }
    proofOfDelivery {
      receivedBy
      deliveryLocation
      deliveredAt
      hasSignatureImage
      hasPhoto
    }
    allowedNextStatuses
  }
}

